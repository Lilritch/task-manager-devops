apiVersion: v1
kind: Secret
metadata:
  name: {{ include "task-manager.appSecretName" . }}
  labels:
    {{- include "task-manager.labels" . | nindent 4 }}
type: Opaque
stringData:
  SECRET_KEY: {{ .Values.app.secretKey | quote }}
  GITHUB_TOKEN: {{ .Values.app.githubToken | quote }}
  GITHUB_OWNER: {{ .Values.app.githubOwner | quote }}
  GITHUB_REPO: {{ .Values.app.githubRepo | quote }}
  SLACK_SIGNING_SECRET: {{ .Values.app.slackSigningSecret | quote }}
  SLACK_DEFAULT_USER_EMAIL: {{ .Values.app.slackDefaultUserEmail | quote }}
  SLACK_ALLOW_UNSIGNED: {{ .Values.app.slackAllowUnsigned | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "task-manager.postgresSecretName" . }}
  labels:
    {{- include "task-manager.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.postgres.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
